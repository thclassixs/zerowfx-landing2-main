<!DOCTYPE html>
<html>

<head>
    <title>ZerowFx - Asset Registry</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: #000;
            color: #fff;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(3px);
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1100px;
            margin: 40px auto;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #00ff00;
            font-size: 3.2em;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 15px #00ff00;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            font-size: 1.3em;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .counter {
            text-align: center;
            color: #00ff00;
            font-size: 1.1em;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .refresh-btn {
            display: block;
            margin: 0 auto 30px;
            background: linear-gradient(to bottom, #00ff00, #00cc00);
            color: white;
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
            transition: all 0.4s;
            letter-spacing: 1px;
        }

        .refresh-btn:hover {
            background: linear-gradient(to bottom, #00ff33, #00ff00);
            transform: translateY(-4px);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.9);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(17, 17, 17, 0.9);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
            border: 1px solid #003300;
        }

        th,
        td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #004400;
            white-space: nowrap;
        }

        th {
            background: #00ff00;
            color: black;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.95em;
            text-shadow: 0 0 8px #000;
        }

        tr:hover {
            background: rgba(0, 255, 0, 0.15);
            transition: background 0.3s;
        }

        td {
            color: #ddd;
            font-size: 0.95em;
        }

        td:first-child {
            color: #00ff00;
            font-weight: bold;
        }

        .status {
            text-align: center;
            color: #66ff66;
            margin-top: 20px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>

<body>

    <div class="overlay"></div>

    <div class="container">
        <h1>ZEROWFX Terminal</h1>
        <p class="subtitle">Classified Asset Registry</p>
        <p class="counter" id="counter"></p>

        <button class="refresh-btn" onclick="loadSubscribers()">Refresh Email List</button>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Email</th>
                        <th>IP</th>
                        <th>Country</th>
                        <th>Date Registered</th>
                    </tr>
                </thead>
                <tbody id="email-table">
                    <!-- Filled by JavaScript -->
                </tbody>
            </table>
        </div>

        <p class="status" id="status">No assets currently registered.</p>
    </div>

    <script>
        // Escape HTML to prevent XSS
        function escapeHtml(str) {
            if (typeof str !== 'string') return str;
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            try {
                const d = new Date(dateStr);
                return d.toLocaleDateString('en-US', {
                    year: 'numeric', month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });
            } catch (e) {
                return dateStr;
            }
        }

        function loadSubscribers() {
            const tbody = document.getElementById("email-table");
            const status = document.getElementById("status");
            const counter = document.getElementById("counter");
            tbody.innerHTML = "<tr><td colspan='5'>Loading intelligence data...</td></tr>";
            status.style.display = "none";
            counter.textContent = "";

            fetch("/subscribers", { credentials: "include" })
                .then(res => {
                    if (!res.ok) throw new Error("Unauthorized or server error");
                    return res.json();
                })
                .then(data => {
                    tbody.innerHTML = "";

                    if (data.length === 0) {
                        status.textContent = "No assets currently registered.";
                        status.style.display = "block";
                        return;
                    }

                    counter.textContent = `Total Assets: ${data.length}`;

                    data.forEach((entry, index) => {
                        const row = document.createElement("tr");

                        // Handle both string and object formats
                        const email = typeof entry === 'string' ? entry : (entry.email || 'N/A');
                        const ip = typeof entry === 'object' ? (entry.ip || 'N/A') : 'N/A';
                        const country = typeof entry === 'object' ? (entry.country || 'Unknown') : 'Unknown';
                        const date = typeof entry === 'object' ? formatDate(entry.createdAt) : 'N/A';

                        // Use textContent for each cell to prevent XSS
                        const numCell = document.createElement('td');
                        numCell.textContent = index + 1;
                        row.appendChild(numCell);

                        const emailCell = document.createElement('td');
                        emailCell.textContent = email;
                        row.appendChild(emailCell);

                        const ipCell = document.createElement('td');
                        ipCell.textContent = ip;
                        row.appendChild(ipCell);

                        const countryCell = document.createElement('td');
                        countryCell.textContent = country;
                        row.appendChild(countryCell);

                        const dateCell = document.createElement('td');
                        dateCell.textContent = date;
                        row.appendChild(dateCell);

                        tbody.appendChild(row);
                    });
                })
                .catch(err => {
                    tbody.innerHTML = "<tr><td colspan='5' style='color:#66ff66;'>Access Denied or Connection Failure</td></tr>";
                    status.textContent = "Error retrieving classified data.";
                    status.style.display = "block";
                });
        }

        // Load on page open
        loadSubscribers();
    </script>

</body>

</html>
