<!DOCTYPE html>
<html>
<head>
    <title>ZerowFx - Access Terminal</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #000
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
        }

        .box {
            position: relative;
            z-index: 10;
            max-width: 400px;
            width: 90%;
            background: rgba(17, 17, 17, 0.85);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.6), inset 0 0 20px rgba(0, 255, 0, 0.3);
            border: 1px solid #00ff00;
            text-align: center;
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px rgba(0, 255, 0, 0.4); }
            100% { box-shadow: 0 0 40px rgba(0, 255, 0, 0.8); }
        }

        .logo {
            width: 120px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px #00ff00);
        }

        h2 {
            color: #00ff00;
            font-size: 2em;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00ff00;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            background: #222;
            border: 2px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 1.1em;
            transition: border 0.3s, box-shadow 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            outline: none;
        }

        input::placeholder {
            color: #aaa;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to bottom, #00ff00, #00cc00);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }

        button:hover {
            background: linear-gradient(to bottom, #00ff33, #00ff00);
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.8);
        }

        button:active {
            transform: translateY(1px);
        }

        #error {
            color: #66ff66;
            margin-top: 15px;
            display: none;
            text-shadow: 0 0 5px #00ff00;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="box">
        <h2>ZerowFx Access</h2>
        <input id="password" type="password" placeholder="Enter Clearance Code">
        <button onclick="login()">Authenticate</button>
        <p id="error">Access Denied - Invalid Code</p>
    </div>

<script>
function login() {
    const password = document.getElementById("password").value;

    fetch("/admin/check-password",{
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ password })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            window.location.href = "/admin/subscribers";
        } else {
            document.getElementById("error").style.display = "block";
            document.querySelector('.box').style.animation = 'none';
            setTimeout(() => document.querySelector('.box').style.animation = 'pulse 4s infinite alternate', 100);
        }
    })
    .catch(err => {
        document.getElementById("error").style.display = "block";
        document.getElementById("error").textContent = "Connection Error";
    });
}
</script>

</body>
</html>
